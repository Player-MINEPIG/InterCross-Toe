<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterCross-Toe 交叉井字棋</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>InterCross-Toe</h1>
      <p class="subtitle">在格子或交叉处落子 · 禁区重叠可解禁</p>
    </header>

    <aside class="config-panel">
      <h2>设置</h2>
      <div class="field">
        <label for="gridSize">棋盘大小</label>
        <input type="number" id="gridSize" min="3" max="12" value="5" />
        <span class="hint">N×N 格子，(N+1)×(N+1) 交叉点</span>
      </div>
      <div class="field">
        <label for="winLength">连子数量</label>
        <input type="number" id="winLength" min="2" max="10" value="3" />
        <span class="hint">同一直线 K 子即胜</span>
      </div>
      <button type="button" id="btnNewGame" class="btn primary">新对局</button>
      <div class="status" id="gameStatus">当前：X</div>
    </aside>

    <main class="game-area">
      <div id="boardWrap" class="board-wrap"></div>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
