<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterCross-Toe · Cross Tic-tac-toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1 id="title">InterCross-Toe</h1>
        <p class="subtitle" id="subtitle">Play on cells or intersections · Overlapping forbidden zones unlock</p>
      </div>
      <div class="lang-switch">
        <button type="button" id="btnLangEn" class="btn-lang active">EN</button>
        <button type="button" id="btnLangZh" class="btn-lang">中文</button>
      </div>
    </header>

    <aside class="config-panel">
      <h2 id="settingsTitle">Settings</h2>
      <div class="field">
        <label for="gridSize" id="labelGridSize">Board size</label>
        <input type="number" id="gridSize" min="3" max="12" />
        <span class="hint" id="hintGridSize">N×N cells, (N+1)×(N+1) intersections</span>
      </div>
      <div class="field">
        <label for="winLength" id="labelWinLength">Win length</label>
        <input type="number" id="winLength" min="2" max="10" />
        <span class="hint" id="hintWinLength">K in a line to win</span>
      </div>
      <button type="button" id="btnNewGame" class="btn primary">New game</button>
      <div class="status" id="gameStatus"></div>

      <div class="room-panel">
        <h2 id="roomTitle">Room</h2>
        <div class="field">
          <label for="inputRoom" id="roomLabel">Room number (1–9)</label>
          <input type="number" id="inputRoom" min="0" max="9" value="0" />
          <span class="hint" id="roomHint">Enter 1–9 to join. 0 = not in a room.</span>
        </div>
        <button type="button" id="btnJoinRoom" class="btn primary">Join</button>
      </div>
    </aside>

    <main class="game-area">
      <div id="boardWrap" class="board-wrap"></div>
    </main>
  </div>

  <script src="game.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRL-6Sj-3u1SRbdjy798R2UWtFCsEu0hQ",
      authDomain: "intercross-toe.firebaseapp.com",
      databaseURL: "https://intercross-toe-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "intercross-toe",
      storageBucket: "intercross-toe.firebasestorage.app",
      messagingSenderId: "158182387847",
      appId: "1:158182387847:web:7ba64ca46cb10ff13f0822",
      measurementId: "G-GEF52X11TV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Expose minimal realtime helpers for game.js
    window.firebaseRealtime = { db, ref, set, onValue };
    if (window.onFirebaseReady) {
      window.onFirebaseReady();
    }
  </script>
</body>
</html>
